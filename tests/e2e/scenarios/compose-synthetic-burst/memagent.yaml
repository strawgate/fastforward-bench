server:
  diagnostics: "0.0.0.0:9090"
  log_level: debug

input:
  type: file
  path: /logs/burst.log
  format: json

transform: >-
  SELECT scenario, source_id, event_id, seq, level, message
  FROM logs
  WHERE scenario = 'compose-synthetic-burst'

output:
  type: tcp
  endpoint: capture:9000
  format: json
