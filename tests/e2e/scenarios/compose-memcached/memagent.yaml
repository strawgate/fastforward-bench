server:
  diagnostics: "0.0.0.0:9090"
  log_level: debug

input:
  type: file
  path: /logs/memcached.log
  format: raw

transform: >-
  SELECT
    'compose-memcached' AS scenario,
    'memcached-verbose' AS source_id,
    regexp_extract(_raw, 'compose-memcached:[0-9]+', 0) AS event_id,
    int(regexp_extract(_raw, 'compose-memcached:([0-9]+)', 1)) AS seq,
    regexp_extract(_raw, '\\b(set|get)\\b', 1) AS command,
    regexp_extract(_raw, 'compose-memcached:[0-9]+', 0) AS key,
    regexp_extract(_raw, 'value-[0-9]+', 0) AS value
  FROM logs
  WHERE _raw LIKE '%compose-memcached:%'
    AND _raw LIKE '%set compose-memcached:%'

output:
  type: tcp
  endpoint: capture:9000
  format: json
