server:
  diagnostics: "0.0.0.0:9090"
  log_level: debug

input:
  type: file
  path: /logs/memcached.log
  format: raw

transform: >-
  SELECT
    'compose-memcached' AS scenario,
    'memcached-verbose' AS source_id,
    regexp_extract(body, 'compose-memcached:[0-9]+', 0) AS event_id,
    'set' AS command,
    regexp_extract(body, 'compose-memcached:[0-9]+', 0) AS key
  FROM logs
  WHERE body LIKE '%compose-memcached:%'
    AND body LIKE '%set compose-memcached:%'

output:
  type: tcp
  endpoint: capture:9000
  format: json
