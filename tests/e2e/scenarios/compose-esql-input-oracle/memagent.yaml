server:
  diagnostics: "0.0.0.0:9090"
  log_level: debug

input:
  type: esql
  esql:
    endpoint: http://elasticsearch:9200
    query: >-
      FROM e2e_logs
      | WHERE scenario == "compose-esql-input-oracle"
      | KEEP scenario, source_id, event_id, seq, message, status
      | SORT seq

transform: "SELECT * FROM logs"

output:
  type: tcp
  endpoint: capture:9000
  format: json
