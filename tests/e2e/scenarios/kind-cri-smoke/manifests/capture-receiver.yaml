apiVersion: apps/v1
kind: Deployment
metadata:
  name: capture-receiver
  labels:
    app: capture-receiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: capture-receiver
  template:
    metadata:
      labels:
        app: capture-receiver
    spec:
      containers:
        - name: capture
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /opt/capture/capture_http.py
            - --port
            - "8080"
            - --output-dir
            - /artifacts
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 2
          volumeMounts:
            - name: capture-script
              mountPath: /opt/capture
              readOnly: true
            - name: capture-data
              mountPath: /artifacts
      volumes:
        - name: capture-script
          configMap:
            name: capture-http-script
        - name: capture-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: capture-receiver
spec:
  selector:
    app: capture-receiver
  ports:
    - port: 8080
      targetPort: 8080
