apiVersion: v1
kind: Pod
metadata:
  name: log-generator
  labels:
    app: log-generator
spec:
  restartPolicy: Never
  containers:
    - name: generator
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          sleep 5
          echo '{"scenario":"kind-vlagent","source_id":"vlagent","event_id":"kind-vlagent:0001","message":"KIND_E2E_VLAGENT_MARKER_001","level":"INFO","seq":1}' >> /vlogs/test.log
          echo '{"scenario":"kind-vlagent","source_id":"vlagent","event_id":"kind-vlagent:0002","message":"KIND_E2E_VLAGENT_MARKER_002","level":"INFO","seq":2}' >> /vlogs/test.log
          echo '{"scenario":"kind-vlagent","source_id":"vlagent","event_id":"kind-vlagent:0003","message":"KIND_E2E_VLAGENT_MARKER_003","level":"WARN","seq":3}' >> /vlogs/test.log
          echo '{"scenario":"kind-vlagent","source_id":"vlagent","event_id":"kind-vlagent:0004","message":"KIND_E2E_VLAGENT_MARKER_004","level":"INFO","seq":4}' >> /vlogs/test.log
          echo '{"scenario":"kind-vlagent","source_id":"vlagent","event_id":"kind-vlagent:0005","message":"KIND_E2E_VLAGENT_MARKER_005","level":"ERROR","seq":5}' >> /vlogs/test.log
          echo '{"scenario":"kind-vlagent","source_id":"vlagent","event_id":"kind-vlagent:0006","message":"KIND_E2E_VLAGENT_MARKER_006","level":"INFO","seq":6}' >> /vlogs/test.log
          echo '{"scenario":"kind-vlagent","source_id":"vlagent","event_id":"kind-vlagent:0007","message":"KIND_E2E_VLAGENT_MARKER_007","level":"DEBUG","seq":7}' >> /vlogs/test.log
          echo '{"scenario":"kind-vlagent","source_id":"vlagent","event_id":"kind-vlagent:0008","message":"KIND_E2E_VLAGENT_MARKER_008","level":"INFO","seq":8}' >> /vlogs/test.log
          echo '{"scenario":"kind-vlagent","source_id":"vlagent","event_id":"kind-vlagent:0009","message":"KIND_E2E_VLAGENT_MARKER_009","level":"WARN","seq":9}' >> /vlogs/test.log
          echo '{"scenario":"kind-vlagent","source_id":"vlagent","event_id":"kind-vlagent:0010","message":"KIND_E2E_VLAGENT_MARKER_010","level":"INFO","seq":10}' >> /vlogs/test.log
          sleep 3600
      volumeMounts:
        - name: e2e-vlogs
          mountPath: /vlogs
  volumes:
    - name: e2e-vlogs
      hostPath:
        path: /var/log/e2e-vlogs
        type: DirectoryOrCreate
