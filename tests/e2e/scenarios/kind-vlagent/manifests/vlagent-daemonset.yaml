apiVersion: v1
kind: ServiceAccount
metadata:
  name: vlagent
  labels:
    app.kubernetes.io/name: vlagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vlagent
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vlagent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vlagent
subjects:
  - kind: ServiceAccount
    name: vlagent
    namespace: e2e-logfwd
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vlagent-bench-collector
  labels:
    app.kubernetes.io/name: vlagent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vlagent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vlagent
    spec:
      serviceAccountName: vlagent
      tolerations:
        - operator: Exists
      containers:
        - name: vlagent
          image: victoriametrics/vlagent:v1.50.0
          imagePullPolicy: IfNotPresent
          args:
            - --fileCollector.glob=/vlogs/test.log
            - --loggerFormat=json
            - --httpListenAddr=:8429
            - --remoteWrite.url=http://localhost:9999/import
            - --tmpDataPath=/var/lib/vlagent
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: e2e-vlogs
              mountPath: /vlogs
            - name: vlagent-data
              mountPath: /var/lib/vlagent
      volumes:
        - name: e2e-vlogs
          hostPath:
            path: /var/log/e2e-vlogs
            type: DirectoryOrCreate
        - name: vlagent-data
          hostPath:
            path: /var/lib/vlagent
            type: DirectoryOrCreate
