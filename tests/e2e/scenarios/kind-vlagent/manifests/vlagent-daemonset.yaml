apiVersion: v1
kind: ServiceAccount
metadata:
  name: vlagent
  labels:
    app.kubernetes.io/name: vlagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vlagent
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vlagent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vlagent
subjects:
  - kind: ServiceAccount
    name: vlagent
    namespace: e2e-logfwd
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vlagent-bench-collector
  labels:
    app.kubernetes.io/name: vlagent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vlagent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vlagent
    spec:
      serviceAccountName: vlagent
      tolerations:
        - operator: Exists
      containers:
        - name: vlagent
          image: victoriametrics/vlagent:v1.50.0
          imagePullPolicy: IfNotPresent
          args:
            - --flagsFile=/etc/vlagent/flags
            - --logFormat=json
            - --logLevel=info
            - --filePath=/vlogs/*.log
            - --labels=app=vlagent,host.hostname={{Host}}
          resources:
            requests:
              cpu: "10m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: vlogs
              mountPath: /vlogs
      volumes:
        - name: vlogs
          emptyDir: {}
