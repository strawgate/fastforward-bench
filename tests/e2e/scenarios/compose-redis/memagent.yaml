server:
  diagnostics: "0.0.0.0:9090"
  log_level: debug

input:
  type: file
  path: /logs/redis-monitor.log
  format: raw

transform: >-
  SELECT
    'compose-redis' AS scenario,
    'redis-monitor' AS source_id,
    regexp_extract(body, 'compose-redis:[0-9]+', 0) AS event_id,
    int(regexp_extract(body, 'compose-redis:([0-9]+)', 1)) AS seq,
    'SET' AS command,
    regexp_extract(body, 'compose-redis:[0-9]+', 0) AS key,
    regexp_extract(body, 'value-[0-9]+', 0) AS value
  FROM logs
  WHERE body LIKE '%compose-redis:%'
    AND body LIKE '%"SET"%'

output:
  type: tcp
  endpoint: capture:9000
  format: json
