services:
  capture:
    image: python:3.12-alpine
    command: ["python", "/workspace/tests/e2e/lib/capture_http.py", "--port", "8080", "--output-dir", "/artifacts"]
    volumes:
      - ${REPO_ROOT:?}:/workspace:ro
      - ${E2E_RESULTS_DIR:?}:/artifacts
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--loglevel", "notice"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis-monitor:
    image: redis:7.4-alpine
    command:
      - sh
      - -lc
      - |
        until redis-cli -h redis ping >/dev/null 2>&1; do sleep 1; done
        redis-cli -h redis MONITOR | tee -a /logs/redis-monitor.log
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ${E2E_RESULTS_DIR:?}/logs:/logs

  memagent:
    image: logfwd:e2e
    command: ["--config", "/scenario/memagent.yaml"]
    depends_on:
      capture:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./memagent.yaml:/scenario/memagent.yaml:ro
      - ${E2E_RESULTS_DIR:?}/logs:/logs

  workload:
    image: redis:7.4-alpine
    command: ["sh", "-lc", "sleep 3600"]
