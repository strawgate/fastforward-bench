server:
  diagnostics: "0.0.0.0:9090"
  log_level: debug

input:
  type: file
  path: /logs/app.cri
  format: cri

transform: >-
  SELECT scenario, source_id, event_id, seq, level, message
  FROM logs
  WHERE scenario = 'compose-synthetic-multiline'

output:
  type: tcp
  endpoint: capture:9000
  format: json
