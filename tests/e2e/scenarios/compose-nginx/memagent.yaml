server:
  diagnostics: "0.0.0.0:9090"
  log_level: debug

input:
  type: file
  path: /logs/nginx.access.log
  format: raw

transform: >-
  SELECT
    'compose-nginx' AS scenario,
    'nginx-access' AS source_id,
    regexp_extract(_raw, 'compose-nginx:[0-9]+', 0) AS event_id,
    int(regexp_extract(_raw, 'compose-nginx:([0-9]+)', 1)) AS seq,
    'GET' AS method,
    regexp_extract(_raw, '^/e2e/compose-nginx/compose-nginx:[0-9]+', 0) AS path,
    204 AS status
  FROM logs
  WHERE _raw LIKE '/e2e/compose-nginx/compose-nginx:%'

output:
  type: tcp
  endpoint: capture:9000
  format: json
