name: KIND: CRI Log Format

on:
  workflow_call:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main

permissions:
  contents: read
  packages: read

jobs:
  kind-cri-smoke:
    uses: ./.github/workflows/_lib/kind-scenario.yml
    with:
      scenario_id: kind-cri-smoke
      cluster_name: kind-cri-smoke
      timeout_minutes: 25
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit
