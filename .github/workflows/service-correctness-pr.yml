name: Service: Correctness (PR)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'tests/e2e/**'
      - '.github/workflows/compose-*.yml'
      - '.github/workflows/kind-*.yml'
      - '.github/workflows/otlp-*.yml'
      - '.github/workflows/service-correctness-*.yml'
      - '.github/workflows/_lib/*.yml'
      - '.github/actions/**'
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main

concurrency:
  group: e2e-pr-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  actions: read
  packages: read

env:
  MEMAGENT_REF: ${{ inputs.memagent_ref || 'main' }}

jobs:
  kind-cri-smoke:
    uses: ./.github/workflows/kind-cri-smoke.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-all:
    uses: ./.github/workflows/docker-compose-correctness.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  otlp-all:
    uses: ./.github/workflows/otlp-correctness.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  kind-vlagent:
    uses: ./.github/workflows/kind-vlagent.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  summarize:
    if: always()
    needs:
      - kind-cri-smoke
      - compose-all
      - otlp-all
      - kind-vlagent
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Summarize and report
        uses: ./.github/actions/summarize-and-report
        with:
          render-script: tests/e2e/lib/render_issue_summary.py
          suite-name: Service: Correctness (PR)
          suite-key: pr
          memagent-ref: ${{ env.MEMAGENT_REF }}
          artifact-name: service-correctness-pr-summary
          issue-title-base: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && 'Service: Correctness (PR) Report' || '' }}
          issue-suite-key: service-correctness-pr
          issue-labels: live-suite-report,report:e2e,report:service-correctness-pr
          github-token: ${{ github.token }}
