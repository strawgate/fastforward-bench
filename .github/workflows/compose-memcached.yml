name: Docker Compose: Memcached

on:
  workflow_call:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main

permissions:
  contents: read
  packages: read

jobs:
  compose-memcached:
    uses: ./.github/workflows/_lib/compose-scenario.yml
    with:
      scenario_id: compose-memcached
      timeout_minutes: 20
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit
