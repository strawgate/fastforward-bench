name: E2E Compose Nightly

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main

concurrency:
  group: e2e-nightly-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  actions: read
  packages: read

env:
  MEMAGENT_REF: ${{ inputs.memagent_ref || 'main' }}

jobs:
  kind-cri-smoke:
    uses: ./.github/workflows/e2e-kind-cri-smoke.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-redis:
    uses: ./.github/workflows/e2e-compose-redis.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-memcached:
    uses: ./.github/workflows/e2e-compose-memcached.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-nginx:
    uses: ./.github/workflows/e2e-compose-nginx.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-synthetic-multiline:
    uses: ./.github/workflows/e2e-compose-synthetic-multiline.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-synthetic-burst:
    uses: ./.github/workflows/e2e-compose-synthetic-burst.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-synthetic-rotation:
    uses: ./.github/workflows/e2e-compose-synthetic-rotation.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  otlp-output-oracle:
    uses: ./.github/workflows/e2e-otlp-output-oracle.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  otlp-input-oracle:
    uses: ./.github/workflows/e2e-otlp-input-oracle.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  summarize:
    if: always()
    needs:
      - kind-cri-smoke
      - compose-redis
      - compose-memcached
      - compose-nginx
      - compose-synthetic-multiline
      - compose-synthetic-burst
      - compose-synthetic-rotation
      - otlp-output-oracle
      - otlp-input-oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Render suite summary
        run: |
          python3 tests/e2e/lib/render_issue_summary.py \
            --artifacts-root artifacts \
            --suite-name "E2E Compose Nightly" \
            --suite-key nightly \
            --memagent-ref "${MEMAGENT_REF}" \
            --run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --output-markdown suite-summary.md \
            --output-json suite-summary.json
      - name: Publish suite summary
        run: cat suite-summary.md >>"$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v5
        with:
          name: e2e-nightly-summary
          path: |
            suite-summary.md
            suite-summary.json
          retention-days: 7
      - name: Upsert suite issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE_BASE: E2E Compose Nightly Report
          ISSUE_BODY_FILE: ${{ github.workspace }}/suite-summary.md
          ISSUE_SUMMARY_JSON_FILE: ${{ github.workspace }}/suite-summary.json
          ISSUE_SUITE_KEY: e2e-nightly
          ISSUE_LABELS: live-suite-report,report:e2e,report:e2e-nightly
        run: tests/e2e/lib/upsert_issue.sh
