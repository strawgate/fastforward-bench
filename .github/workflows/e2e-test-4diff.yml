name: E2E / TEST 4Diff

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths:
      - '.github/workflows/e2e-test-4diff.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  j1:
    uses: ./.github/workflows/e2e-kind-cri-smoke.yml
    with:
      memagent_ref: main
    secrets: inherit
  j2:
    uses: ./.github/workflows/e2e-compose-redis.yml
    with:
      memagent_ref: main
    secrets: inherit
  j3:
    uses: ./.github/workflows/e2e-compose-nginx.yml
    with:
      memagent_ref: main
    secrets: inherit
  j4:
    uses: ./.github/workflows/e2e-compose-synthetic-multiline.yml
    with:
      memagent_ref: main
    secrets: inherit
