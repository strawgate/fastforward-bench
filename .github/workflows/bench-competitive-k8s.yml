name: Bench / Competitive Throughput (K8s)

on:
  pull_request:
    branches: [main]
    paths:
      - 'bench/kind/**'
      - 'bench/lib/**'
      - 'reporting/**'
      - '.github/workflows/bench-competitive-k8s.yml'
      - '.github/workflows/aggregate-benchmark-data.yml'
      - '.github/actions/setup-memagent-build/**'
      - '.github/actions/checkout-memagent/**'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main
      profile:
        description: benchmark workload profile
        required: false
        type: choice
        default: smoke
        options:
          - quick
          - smoke
          - default
      target_set:
        description: target EPS set
        required: false
        type: choice
        default: profile
        options:
          - profile
          - ladder
          - ladder_and_max
          - max
          - fastforward_max
      collector:
        description: collector adapter to benchmark
        required: false
        type: choice
        default: all
        options:
          - all
          - fastforward
          - otelcol
          - vector
          - filebeat
          - vlagent
      cpu_profile:
        description: CPU profile to benchmark
        required: false
        type: choice
        default: all
        options:
          - all
          - single
          - multi
      ingest_mode:
        description: collector ingest mode to benchmark
        required: false
        type: choice
        default: all
        options:
          - all
          - file
          - otlp
      persist_data:
        description: persist benchkit data to bench-data branch
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
      collector_batch_target_bytes:
        description: optional fastforward collector batch_target_bytes override
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: write
  issues: write
  packages: read

env:
  MEMAGENT_REF: ${{ inputs.memagent_ref || 'main' }}
  PERSIST_BENCH_DATA: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.persist_data == 'true')) && 'true' || 'false' }}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      bench_profile: ${{ steps.plan.outputs.bench_profile }}
      target_set: ${{ steps.plan.outputs.target_set }}
      collectors: ${{ steps.plan.outputs.collectors }}
      cpu_profiles: ${{ steps.plan.outputs.cpu_profiles }}
      ingest_modes: ${{ steps.plan.outputs.ingest_modes }}
      workloads: ${{ steps.plan.outputs.workloads }}
    steps:
      - id: plan
        env:
          INPUT_PROFILE: ${{ inputs.profile || 'smoke' }}
          INPUT_TARGET_SET: ${{ inputs.target_set || 'profile' }}
          INPUT_COLLECTOR: ${{ inputs.collector || 'all' }}
          INPUT_CPU_PROFILE: ${{ inputs.cpu_profile || 'all' }}
          INPUT_INGEST_MODE: ${{ inputs.ingest_mode || 'all' }}
        run: |
          echo "bench_profile=${INPUT_PROFILE}" >>"$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            TARGET_SET="ladder_and_max"
          else
            TARGET_SET="${INPUT_TARGET_SET}"
          fi
          echo "target_set=${TARGET_SET}" >>"$GITHUB_OUTPUT"

          case "${TARGET_SET}" in
            profile)
              if [[ "${INPUT_PROFILE}" == "quick" ]]; then
                echo 'workloads=[{"label":"profile-quick","pods":1,"eps_per_pod":10}]' >>"$GITHUB_OUTPUT"
              elif [[ "${INPUT_PROFILE}" == "default" ]]; then
                echo 'workloads=[{"label":"profile-default","pods":30,"eps_per_pod":300}]' >>"$GITHUB_OUTPUT"
              else
                echo 'workloads=[{"label":"profile-smoke","pods":5,"eps_per_pod":100}]' >>"$GITHUB_OUTPUT"
              fi
              ;;
            ladder)
              if [[ "${INPUT_PROFILE}" == "quick" ]]; then
                echo 'workloads=[{"label":"t10","pods":1,"eps_per_pod":10},{"label":"t100","pods":1,"eps_per_pod":100},{"label":"t1k","pods":1,"eps_per_pod":1000},{"label":"t10k","pods":1,"eps_per_pod":10000},{"label":"t100k","pods":1,"eps_per_pod":100000}]' >>"$GITHUB_OUTPUT"
              else
                echo 'workloads=[{"label":"t1","pods":1,"eps_per_pod":1},{"label":"t10","pods":1,"eps_per_pod":10},{"label":"t100","pods":1,"eps_per_pod":100},{"label":"t1k","pods":1,"eps_per_pod":1000},{"label":"t10k","pods":1,"eps_per_pod":10000},{"label":"t100k","pods":1,"eps_per_pod":100000},{"label":"t1m","pods":1,"eps_per_pod":1000000}]' >>"$GITHUB_OUTPUT"
              fi
              ;;
            ladder_and_max)
              if [[ "${INPUT_PROFILE}" == "quick" ]]; then
                echo 'workloads=[{"label":"t10","pods":1,"eps_per_pod":10},{"label":"t100","pods":1,"eps_per_pod":100},{"label":"t1k","pods":1,"eps_per_pod":1000},{"label":"t10k","pods":1,"eps_per_pod":10000},{"label":"t100k","pods":1,"eps_per_pod":100000},{"label":"tmax","pods":1,"eps_per_pod":0}]' >>"$GITHUB_OUTPUT"
              else
                echo 'workloads=[{"label":"t1","pods":1,"eps_per_pod":1},{"label":"t10","pods":1,"eps_per_pod":10},{"label":"t100","pods":1,"eps_per_pod":100},{"label":"t1k","pods":1,"eps_per_pod":1000},{"label":"t10k","pods":1,"eps_per_pod":10000},{"label":"t100k","pods":1,"eps_per_pod":100000},{"label":"t1m","pods":1,"eps_per_pod":1000000},{"label":"tmax","pods":1,"eps_per_pod":0}]' >>"$GITHUB_OUTPUT"
              fi
              ;;
            max|fastforward_max)
              echo 'workloads=[{"label":"tmax","pods":1,"eps_per_pod":0}]' >>"$GITHUB_OUTPUT"
              ;;
            *)
              echo "unsupported target_set: ${TARGET_SET}" >&2
              exit 2
              ;;
          esac

          if [[ "${TARGET_SET}" == "fastforward_max" ]]; then
            echo 'collectors=["fastforward"]' >>"$GITHUB_OUTPUT"
          else
            echo 'collectors=["fastforward","otelcol","vector","filebeat","vlagent"]' >>"$GITHUB_OUTPUT"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${INPUT_CPU_PROFILE}" != "all" ]]; then
            echo "cpu_profiles=[\"${INPUT_CPU_PROFILE}\"]" >>"$GITHUB_OUTPUT"
          else
            echo 'cpu_profiles=["single"]' >>"$GITHUB_OUTPUT"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${INPUT_INGEST_MODE}" != "all" ]]; then
            echo "ingest_modes=[\"${INPUT_INGEST_MODE}\"]" >>"$GITHUB_OUTPUT"
          else
            echo 'ingest_modes=["file","otlp"]' >>"$GITHUB_OUTPUT"
          fi

  kind-bench-smoke:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        ingest_mode: ${{ fromJSON(needs.plan.outputs.ingest_modes) }}
        collector: ${{ fromJSON(needs.plan.outputs.collectors) }}
        cpu_profile: ${{ fromJSON(needs.plan.outputs.cpu_profiles) }}
        workload: ${{ fromJSON(needs.plan.outputs.workloads) }}
        exclude:
          - ingest_mode: otlp
            collector: vector
          # Skip ladder/profile runs for 3rd party collectors - only run 'tmax'
          - collector: otelcol
            workload: {label: "profile-smoke"}
          - collector: otelcol
            workload: {label: "profile-quick"}
          - collector: otelcol
            workload: {label: "profile-default"}
          - collector: otelcol
            workload: {label: "t1"}
          - collector: otelcol
            workload: {label: "t10"}
          - collector: otelcol
            workload: {label: "t100"}
          - collector: otelcol
            workload: {label: "t1k"}
          - collector: otelcol
            workload: {label: "t10k"}
          - collector: otelcol
            workload: {label: "t100k"}
          - collector: otelcol
            workload: {label: "t1m"}
          - collector: vector
            workload: {label: "profile-smoke"}
          - collector: vector
            workload: {label: "profile-quick"}
          - collector: vector
            workload: {label: "profile-default"}
          - collector: vector
            workload: {label: "t1"}
          - collector: vector
            workload: {label: "t10"}
          - collector: vector
            workload: {label: "t100"}
          - collector: vector
            workload: {label: "t1k"}
          - collector: vector
            workload: {label: "t10k"}
          - collector: vector
            workload: {label: "t100k"}
          - collector: vector
            workload: {label: "t1m"}
          - collector: filebeat
            workload: {label: "profile-smoke"}
          - collector: filebeat
            workload: {label: "profile-quick"}
          - collector: filebeat
            workload: {label: "profile-default"}
          - collector: filebeat
            workload: {label: "t1"}
          - collector: filebeat
            workload: {label: "t10"}
          - collector: filebeat
            workload: {label: "t100"}
          - collector: filebeat
            workload: {label: "t1k"}
          - collector: filebeat
            workload: {label: "t10k"}
          - collector: filebeat
            workload: {label: "t100k"}
          - collector: filebeat
            workload: {label: "t1m"}
          - collector: vlagent
            workload: {label: "profile-smoke"}
          - collector: vlagent
            workload: {label: "profile-quick"}
          - collector: vlagent
            workload: {label: "profile-default"}
          - collector: vlagent
            workload: {label: "t1"}
          - collector: vlagent
            workload: {label: "t10"}
          - collector: vlagent
            workload: {label: "t100"}
          - collector: vlagent
            workload: {label: "t1k"}
          - collector: vlagent
            workload: {label: "t10k"}
          - collector: vlagent
            workload: {label: "t100k"}
          - collector: vlagent
            workload: {label: "t1m"}
          - ingest_mode: otlp
            collector: filebeat
          - ingest_mode: otlp
            collector: vlagent
    env:
      MEMAGENT_REPO_ROOT: ${{ github.workspace }}/memagent
      BENCH_PROFILE: ${{ needs.plan.outputs.bench_profile }}
      BENCH_RESULTS_DIR: ${{ github.workspace }}/bench/kind/results/${{ needs.plan.outputs.bench_profile }}/${{ matrix.ingest_mode }}/${{ matrix.workload.label }}/${{ matrix.cpu_profile }}/${{ matrix.collector }}
      CLUSTER_NAME: b-${{ github.run_id }}-${{ matrix.ingest_mode }}-${{ matrix.cpu_profile }}-${{ matrix.collector }}
      BENCH_COLLECTOR: ${{ matrix.collector }}
      BENCH_INGEST_MODE: ${{ matrix.ingest_mode }}
      BENCH_CPU_PROFILE: ${{ matrix.cpu_profile }}
      BENCH_WORKLOAD_LABEL: ${{ matrix.workload.label }}
      BENCH_PODS: ${{ matrix.workload.pods }}
      BENCH_EPS_PER_POD: ${{ matrix.workload.eps_per_pod }}
      BENCHKIT_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}--kind-bench-${{ needs.plan.outputs.bench_profile }}-${{ matrix.ingest_mode }}-${{ matrix.workload.label }}-${{ matrix.cpu_profile }}-${{ matrix.collector }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/checkout-memagent
        with:
          memagent-ref: ${{ env.MEMAGENT_REF }}
          memagent-path: memagent
      - uses: ./.github/actions/setup-memagent-build
        with:
          memagent-repo-root: memagent
          memagent-ref: ${{ env.MEMAGENT_REF }}
      - uses: ./.github/actions/setup-kind
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Start Octo11y monitor
        id: monitor
        uses: strawgate/o11ykit/octo11y/actions/monitor@main-dist
        with:
          run-id: ${{ env.BENCHKIT_RUN_ID }}
          scrape-interval: 1s
          metric-sets: cpu,memory,load,process
      - name: Run benchmark harness
        continue-on-error: ${{ github.event_name == 'schedule' || matrix.workload.label == 'tmax' || matrix.workload.eps_per_pod >= 10000 }}
        run: |
          set -euo pipefail
          mkdir -p "${BENCH_RESULTS_DIR}"
          HARNESS_LOG="${BENCH_RESULTS_DIR}/harness.log"
          if ! python3 bench/kind/run.py \
            --cluster-name "${CLUSTER_NAME}" \
            --collector "${BENCH_COLLECTOR}" \
            --ingest-mode "${BENCH_INGEST_MODE}" \
            --profile "${BENCH_PROFILE}" \
            --cpu-profile "${BENCH_CPU_PROFILE}" \
            --pods "${BENCH_PODS}" \
            --eps-per-pod "${BENCH_EPS_PER_POD}" \
            --benchkit-run-id "${BENCHKIT_RUN_ID}" \
            --benchkit-kind "hybrid" \
            --results-dir "${BENCH_RESULTS_DIR}" \
            --collector-batch-target-bytes "${{ inputs.collector_batch_target_bytes }}" \
            >"${HARNESS_LOG}" 2>&1; then
            echo "kind harness failed, tailing ${HARNESS_LOG}"
            tail -n 200 "${HARNESS_LOG}" || true
            exit 1
          fi
          tail -n 40 "${HARNESS_LOG}" || true
      - if: always()
        name: Ensure fallback benchmark result exists
        run: |
          if [[ -f "${BENCH_RESULTS_DIR}/result.json" ]]; then
            exit 0
          fi
          python3 bench/lib/write_missing_result.py \
            --output-dir "${BENCH_RESULTS_DIR}" \
            --cluster "kind" \
            --cluster-name "${CLUSTER_NAME}" \
            --namespace "benchkit" \
            --collector "${BENCH_COLLECTOR}" \
            --ingest-mode "${BENCH_INGEST_MODE}" \
            --cpu-profile "${BENCH_CPU_PROFILE}" \
            --pods "${BENCH_PODS}" \
            --target-eps-per-pod "${BENCH_EPS_PER_POD}" \
            --notes "kind benchmark harness exited before writing result.json"
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Stash jitter
        shell: bash
        run: |
          seed="$(printf '%s' "${BENCHKIT_RUN_ID}" | cksum | awk '{print $1}')"
          sleep_seconds=$(( (seed % 17) + 3 ))
          echo "Delaying stash push by ${sleep_seconds}s to reduce bench-data contention"
          sleep "${sleep_seconds}"
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Stash benchmark run
        continue-on-error: true
        uses: strawgate/o11ykit/actions/parse-results@main-dist
        with:
          mode: file
          results: ${{ env.BENCH_RESULTS_DIR }}/benchkit-run.otlp.json
          format: otlp
          run-id: ${{ env.BENCHKIT_RUN_ID }}
          github-token: ${{ github.token }}
          summary: true
      - if: always()
        uses: actions/upload-artifact@v5
        with:
          name: kind-bench-${{ needs.plan.outputs.bench_profile }}-${{ matrix.ingest_mode }}-${{ matrix.workload.label }}-${{ matrix.cpu_profile }}-${{ matrix.collector }}
          path: ${{ env.BENCH_RESULTS_DIR }}
          retention-days: 7

  summarize:
    if: always()
    needs:
      - plan
      - kind-bench-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Summarize and report
        uses: ./.github/actions/summarize-and-report
        with:
          render-script: bench/kind/render_issue_summary.py
          suite-name: ${{ github.event_name == 'schedule' && 'Competitive Throughput (K8s) - Nightly' || 'Competitive Throughput (K8s)' }}
          suite-key: kind-bench-${{ needs.plan.outputs.bench_profile }}-${{ needs.plan.outputs.target_set }}
          memagent-ref: ${{ env.MEMAGENT_REF }}
          extra-render-args: --bench-profile "${{ needs.plan.outputs.bench_profile }}"
          summary-prefix: bench-summary
          artifact-name: bench-kind-summary
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Trigger aggregate
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run aggregate-benchmark-data.yml --repo ${{ github.repository }}
      - if: github.event_name != 'pull_request'
        id: issue_meta
        name: Compute benchmark issue metadata
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            {
              echo "title_base=Competitive Throughput (K8s) Report"
              echo "suite_key=bench-nightly-eps"
              echo "labels=live-suite-report,report:bench,report:bench-nightly-eps"
            } >>"$GITHUB_OUTPUT"
          else
            target_set="${{ needs.plan.outputs.target_set }}"
            {
              echo "title_base=Competitive Throughput (K8s) Report (${target_set})"
              echo "suite_key=bench-competitive-${target_set}"
              echo "labels=live-suite-report,report:bench,report:bench-competitive"
            } >>"$GITHUB_OUTPUT"
          fi
      - if: github.event_name != 'pull_request'
        name: Upsert benchmark issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE_BASE: ${{ steps.issue_meta.outputs.title_base }}
          ISSUE_BODY_FILE: ${{ github.workspace }}/bench-summary.md
          ISSUE_SUMMARY_JSON_FILE: ${{ github.workspace }}/bench-summary.json
          ISSUE_SUITE_KEY: ${{ steps.issue_meta.outputs.suite_key }}
          ISSUE_LABELS: ${{ steps.issue_meta.outputs.labels }}
        run: tests/e2e/lib/upsert_issue.sh
      - if: always()
        name: Enforce benchmark matrix truthfulness
        uses: ./.github/actions/validate-bench-matrix
        with:
          expected-collectors: ${{ needs.plan.outputs.collectors }}
          expected-cpu-profiles: ${{ needs.plan.outputs.cpu_profiles }}
          expected-ingest-modes: ${{ needs.plan.outputs.ingest_modes }}
          expected-workloads: ${{ needs.plan.outputs.workloads }}
          otlp-excluded-collectors: '["vector","filebeat","vlagent"]'
          tmax-only-collectors: '["otelcol","vector","filebeat","vlagent"]'
          non-gating-collectors: '["vector"]'
