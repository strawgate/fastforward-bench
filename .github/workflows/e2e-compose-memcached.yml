name: E2E / compose-memcached

on:
  workflow_call:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: master
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: master

permissions:
  contents: read
  packages: read

jobs:
  compose-memcached:
    uses: ./.github/workflows/_scenario-compose.yml
    with:
      scenario_id: compose-memcached
      timeout_minutes: 20
      memagent_ref: ${{ inputs.memagent_ref || 'master' }}
    secrets: inherit
