name: Bench / kind smoke

on:
  pull_request:
    branches: [master]
    paths:
      - 'bench/kind/**'
      - '.github/workflows/bench-kind-smoke.yml'
      - '.github/workflows/bench-kind-aggregate.yml'
      - '.github/actions/setup-memagent-build/**'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: master

permissions:
  contents: write
  actions: write
  packages: read

env:
  MEMAGENT_REF: ${{ inputs.memagent_ref || 'master' }}
  BENCHKIT_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}--kind-bench-smoke
  PERSIST_BENCH_DATA: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}

jobs:
  kind-bench-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      MEMAGENT_REPO_ROOT: ${{ github.workspace }}/memagent
      BENCH_RESULTS_DIR: ${{ github.workspace }}/bench/kind/results/smoke
      CLUSTER_NAME: bench-smoke-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: strawgate/memagent
          ref: ${{ env.MEMAGENT_REF }}
          path: memagent
      - uses: ./.github/actions/setup-memagent-build
        with:
          memagent-repo-root: memagent
          memagent-ref: ${{ env.MEMAGENT_REF }}
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Start Octo11y monitor
        id: monitor
        uses: strawgate/octo11y/actions/monitor@main-dist
        with:
          run-id: ${{ env.BENCHKIT_RUN_ID }}
          scrape-interval: 1s
          metric-sets: cpu,memory,load,process
      - name: Install KIND
        run: |
          if ! command -v kind >/dev/null 2>&1; then
            KIND_VERSION="v0.24.0"
            curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
            chmod +x ./kind
            sudo mv ./kind /usr/local/bin/kind
          fi
      - name: Run benchmark harness
        run: |
          python3 bench/kind/run.py \
            --phase smoke \
            --profile smoke \
            --collector logfwd \
            --protocol otlp_http \
            --cluster-name "${CLUSTER_NAME}" \
            --benchkit-run-id "${BENCHKIT_RUN_ID}" \
            --benchkit-kind "hybrid" \
            --results-dir "${BENCH_RESULTS_DIR}"
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Stash benchmark run
        uses: strawgate/octo11y/actions/stash@main-dist
        with:
          results: ${{ env.BENCH_RESULTS_DIR }}/benchkit-run.otlp.json
          format: otlp
          run-id: ${{ env.BENCHKIT_RUN_ID }}
          summary: true
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Trigger aggregate
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run bench-kind-aggregate.yml --repo ${{ github.repository }}
      - if: always()
        name: Publish summary
        run: |
          if [[ -f "${BENCH_RESULTS_DIR}/summary.md" ]]; then
            cat "${BENCH_RESULTS_DIR}/summary.md" >>"$GITHUB_STEP_SUMMARY"
          fi
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kind-bench-smoke
          path: ${{ env.BENCH_RESULTS_DIR }}
          retention-days: 7
