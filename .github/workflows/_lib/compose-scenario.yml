name: Docker Compose Scenario

on:
  workflow_call:
    inputs:
      scenario_id:
        required: true
        type: string
      timeout_minutes:
        required: false
        type: number
        default: 20
      memagent_ref:
        required: false
        type: string
        default: main

permissions:
  contents: read
  packages: read

jobs:
  scenario:
    name: ${{ inputs.scenario_id }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      MEMAGENT_REF: ${{ inputs.memagent_ref }}
      E2E_RESULTS_DIR: ${{ github.workspace }}/tests/e2e/results/${{ inputs.scenario_id }}
      REPO_ROOT: ${{ github.workspace }}
      MEMAGENT_REPO_ROOT: ${{ github.workspace }}/memagent
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/checkout-memagent
        with:
          memagent-ref: ${{ env.MEMAGENT_REF }}
          memagent-path: memagent
      - name: Validate scenario contract
        run: python3 tests/e2e/lib/check_scenarios.py --repo-root . --scenario-id "${{ inputs.scenario_id }}"
      - uses: ./.github/actions/setup-memagent-build
        with:
          memagent-repo-root: memagent
          memagent-ref: ${{ env.MEMAGENT_REF }}
      - uses: ./.github/actions/setup-compose
        with:
          results-dir: ${{ env.E2E_RESULTS_DIR }}
      - name: Run scenario
        run: tests/e2e/run-scenario.sh "${{ inputs.scenario_id }}"
      - if: always()
        uses: ./.github/actions/collect-e2e-artifacts
        with:
          results-dir: ${{ env.E2E_RESULTS_DIR }}
      - if: always()
        uses: ./.github/actions/publish-e2e-summary
        with:
          summary-file: ${{ env.E2E_RESULTS_DIR }}/summary.md
      - if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.scenario_id }}
          path: ${{ env.E2E_RESULTS_DIR }}
          retention-days: 7
