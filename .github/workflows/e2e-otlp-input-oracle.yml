name: E2E / otlp-input-oracle

on:
  workflow_call:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: master
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: master

permissions:
  contents: read

jobs:
  otlp-input-oracle:
    uses: ./.github/workflows/_scenario-otlp.yml
    with:
      scenario_id: otlp-input-oracle
      timeout_minutes: 30
      memagent_ref: ${{ inputs.memagent_ref || 'master' }}
    secrets: inherit
