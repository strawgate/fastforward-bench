name: Aggregate Benchmark Data

on:
  workflow_dispatch:

concurrency:
  group: aggregate-benchmark-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Aggregate benchmark data
        uses: strawgate/o11ykit/octo11y/actions/aggregate@main-dist
        with:
          max-runs: 50
