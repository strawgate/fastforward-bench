name: E2E / smoke suite

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'tests/e2e/**'
      - '.github/workflows/e2e-*.yml'
      - '.github/workflows/_scenario-*.yml'
      - '.github/actions/collect-e2e-artifacts/**'
      - '.github/actions/publish-e2e-summary/**'
      - '.github/actions/setup-compose/**'
      - '.github/actions/setup-kind/**'
      - '.github/actions/setup-memagent-build/**'
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main

concurrency:
  group: e2e-smoke-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  actions: read
  packages: read

env:
  MEMAGENT_REF: ${{ inputs.memagent_ref || 'main' }}

jobs:
  kind-cri-smoke:
    uses: ./.github/workflows/e2e-kind-cri-smoke.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-redis:
    uses: ./.github/workflows/e2e-compose-redis.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-nginx:
    uses: ./.github/workflows/e2e-compose-nginx.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-synthetic-multiline:
    uses: ./.github/workflows/e2e-compose-synthetic-multiline.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  otlp-output-oracle:
    uses: ./.github/workflows/e2e-otlp-output-oracle.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  summarize:
    if: always()
    needs:
      - kind-cri-smoke
      - compose-redis
      - compose-nginx
      - compose-synthetic-multiline
      - otlp-output-oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Render suite summary
        run: |
          python3 tests/e2e/lib/render_issue_summary.py \
            --artifacts-root artifacts \
            --suite-name "E2E Smoke Suite" \
            --suite-key smoke \
            --memagent-ref "${MEMAGENT_REF}" \
            --run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --output-markdown suite-summary.md \
            --output-json suite-summary.json
      - name: Publish suite summary
        run: cat suite-summary.md >>"$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v5
        with:
          name: e2e-smoke-summary
          path: |
            suite-summary.md
            suite-summary.json
          retention-days: 7
      - name: Upsert suite issue
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE_BASE: E2E Smoke Suite Report
          ISSUE_BODY_FILE: ${{ github.workspace }}/suite-summary.md
          ISSUE_SUMMARY_JSON_FILE: ${{ github.workspace }}/suite-summary.json
          ISSUE_SUITE_KEY: e2e-smoke
          ISSUE_LABELS: live-suite-report,report:e2e,report:e2e-smoke
        run: tests/e2e/lib/upsert_issue.sh
