name: E2E / TEST No Secrets

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths:
      - '.github/workflows/e2e-test-no-secrets.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  kind-cri-smoke:
    uses: ./.github/workflows/e2e-kind-cri-smoke.yml
    with:
      memagent_ref: main
  compose-redis:
    uses: ./.github/workflows/e2e-compose-redis.yml
    with:
      memagent_ref: main
  compose-nginx:
    uses: ./.github/workflows/e2e-compose-nginx.yml
    with:
      memagent_ref: main
  compose-multiline:
    uses: ./.github/workflows/e2e-compose-synthetic-multiline.yml
    with:
      memagent_ref: main
  otlp-oracle:
    uses: ./.github/workflows/e2e-otlp-output-oracle.yml
    with:
      memagent_ref: main
