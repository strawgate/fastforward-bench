name: E2E / Service Monitoring (Full)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main

concurrency:
  group: e2e-nightly-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  actions: read
  packages: read

env:
  MEMAGENT_REF: ${{ inputs.memagent_ref || 'main' }}

jobs:
  kind-cri-smoke:
    uses: ./.github/workflows/e2e-kind-cri-smoke.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-all:
    uses: ./.github/workflows/e2e-compose-all.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  otlp-all:
    uses: ./.github/workflows/e2e-otlp-all.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  summarize:
    if: always()
    needs:
      - kind-cri-smoke
      - compose-all
      - otlp-all
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Summarize and report
        uses: ./.github/actions/summarize-and-report
        with:
          render-script: tests/e2e/lib/render_issue_summary.py
          suite-name: E2E / Service Monitoring (Full)
          suite-key: nightly
          memagent-ref: ${{ env.MEMAGENT_REF }}
          artifact-name: e2e-nightly-summary
          issue-title-base: E2E / Service Monitoring (Full) Report
          issue-suite-key: e2e-nightly
          issue-labels: live-suite-report,report:e2e,report:e2e-nightly
          github-token: ${{ github.token }}
