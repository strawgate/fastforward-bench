name: E2E / Service Monitoring (Full)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main

concurrency:
  group: e2e-nightly-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  actions: read
  packages: read

env:
  MEMAGENT_REF: ${{ inputs.memagent_ref || 'main' }}

jobs:
  kind-cri-smoke:
    uses: ./.github/workflows/e2e-kind-cri-smoke.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-redis:
    uses: ./.github/workflows/e2e-compose-redis.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-memcached:
    uses: ./.github/workflows/e2e-compose-memcached.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-nginx:
    uses: ./.github/workflows/e2e-compose-nginx.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-synthetic-multiline:
    uses: ./.github/workflows/e2e-compose-synthetic-multiline.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-synthetic-burst:
    uses: ./.github/workflows/e2e-compose-synthetic-burst.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-synthetic-rotation:
    uses: ./.github/workflows/e2e-compose-synthetic-rotation.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  otlp-output-oracle:
    uses: ./.github/workflows/e2e-otlp-output-oracle.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  otlp-input-oracle:
    uses: ./.github/workflows/e2e-otlp-input-oracle.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  kind-vlagent:
    uses: ./.github/workflows/e2e-kind-vlagent.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  summarize:
    if: always()
    needs:
      - kind-cri-smoke
      - kind-vlagent
      - compose-redis
      - compose-memcached
      - compose-nginx
      - compose-synthetic-multiline
      - compose-synthetic-burst
      - compose-synthetic-rotation
      - otlp-output-oracle
      - otlp-input-oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Summarize and report
        uses: ./.github/actions/summarize-and-report
        with:
          render-script: tests/e2e/lib/render_issue_summary.py
          suite-name: E2E / Service Monitoring (Full)
          suite-key: nightly
          memagent-ref: ${{ env.MEMAGENT_REF }}
          artifact-name: e2e-nightly-summary
          issue-title-base: E2E / Service Monitoring (Full) Report
          issue-suite-key: e2e-nightly
          issue-labels: live-suite-report,report:e2e,report:e2e-nightly
          github-token: ${{ github.token }}
