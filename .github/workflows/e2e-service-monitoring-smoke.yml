name: E2E / Service Monitoring (Smoke)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'tests/e2e/**'
      - '.github/workflows/e2e-*.yml'
      - '.github/workflows/_scenario-*.yml'
      - '.github/actions/collect-e2e-artifacts/**'
      - '.github/actions/publish-e2e-summary/**'
      - '.github/actions/checkout-memagent/**'
      - '.github/actions/setup-compose/**'
      - '.github/actions/setup-kind/**'
      - '.github/actions/setup-memagent-build/**'
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main

concurrency:
  group: e2e-smoke-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  actions: read
  packages: read

env:
  MEMAGENT_REF: ${{ inputs.memagent_ref || 'main' }}

jobs:
  kind-cri-smoke:
    uses: ./.github/workflows/e2e-kind-cri-smoke.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  compose-all:
    uses: ./.github/workflows/e2e-compose-all.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  otlp-all:
    uses: ./.github/workflows/e2e-otlp-all.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  kind-vlagent:
    uses: ./.github/workflows/e2e-kind-vlagent.yml
    with:
      memagent_ref: ${{ inputs.memagent_ref || 'main' }}
    secrets: inherit

  summarize:
    if: always()
    needs:
      - kind-cri-smoke
      - compose-all
      - otlp-all
      - kind-vlagent
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Summarize and report
        uses: ./.github/actions/summarize-and-report
        with:
          render-script: tests/e2e/lib/render_issue_summary.py
          suite-name: E2E / Service Monitoring (Smoke)
          suite-key: smoke
          memagent-ref: ${{ env.MEMAGENT_REF }}
          artifact-name: e2e-smoke-summary
          issue-title-base: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && 'E2E / Service Monitoring (Smoke) Report' || '' }}
          issue-suite-key: e2e-smoke
          issue-labels: live-suite-report,report:e2e,report:e2e-smoke
          github-token: ${{ github.token }}
