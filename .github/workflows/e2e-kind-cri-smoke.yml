name: E2E / kind-cri-smoke

on:
  workflow_call:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: master
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: master

permissions:
  contents: read
  packages: read

jobs:
  kind-cri-smoke:
    uses: ./.github/workflows/_scenario-kind.yml
    with:
      scenario_id: kind-cri-smoke
      cluster_name: kind-cri-smoke
      timeout_minutes: 25
      memagent_ref: ${{ inputs.memagent_ref || 'master' }}
    secrets: inherit
