name: Bench / compose smoke

on:
  pull_request:
    branches: [master]
    paths:
      - 'bench/compose/**'
      - '.github/workflows/bench-compose-smoke.yml'
      - '.github/workflows/bench-kind-aggregate.yml'
      - '.github/actions/setup-memagent-build/**'
      - '.github/actions/setup-compose/**'
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:
    inputs:
      memagent_ref:
        description: memagent branch, tag, or SHA to test
        required: false
        type: string
        default: main
      profile:
        description: benchmark workload profile
        required: false
        type: choice
        default: smoke
        options:
          - smoke
          - default
      target_set:
        description: target EPS set
        required: false
        type: choice
        default: profile
        options:
          - profile
          - ladder
          - ladder_and_max
          - max
      collector:
        description: collector adapter to benchmark
        required: false
        type: choice
        default: all
        options:
          - all
          - logfwd
          - otelcol
          - vector
          - filebeat
      cpu_profile:
        description: CPU profile to benchmark
        required: false
        type: choice
        default: all
        options:
          - all
          - single
          - multi
      ingest_mode:
        description: collector ingest mode to benchmark
        required: false
        type: choice
        default: all
        options:
          - all
          - file
          - otlp
      persist_data:
        description: persist benchkit data to bench-data branch
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  actions: write
  issues: write
  packages: read

env:
  MEMAGENT_REF: ${{ inputs.memagent_ref || 'main' }}
  PERSIST_BENCH_DATA: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.persist_data == 'true')) && 'true' || 'false' }}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      bench_profile: ${{ steps.plan.outputs.bench_profile }}
      target_set: ${{ steps.plan.outputs.target_set }}
      collectors: ${{ steps.plan.outputs.collectors }}
      cpu_profiles: ${{ steps.plan.outputs.cpu_profiles }}
      ingest_modes: ${{ steps.plan.outputs.ingest_modes }}
      workloads: ${{ steps.plan.outputs.workloads }}
    steps:
      - id: plan
        env:
          INPUT_PROFILE: ${{ inputs.profile || 'smoke' }}
          INPUT_TARGET_SET: ${{ inputs.target_set || 'profile' }}
          INPUT_COLLECTOR: ${{ inputs.collector || 'all' }}
          INPUT_CPU_PROFILE: ${{ inputs.cpu_profile || 'all' }}
          INPUT_INGEST_MODE: ${{ inputs.ingest_mode || 'all' }}
        run: |
          echo "bench_profile=${INPUT_PROFILE}" >>"$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            TARGET_SET="ladder_and_max"
          else
            TARGET_SET="${INPUT_TARGET_SET}"
          fi
          echo "target_set=${TARGET_SET}" >>"$GITHUB_OUTPUT"

          case "${TARGET_SET}" in
            profile)
              if [[ "${INPUT_PROFILE}" == "default" ]]; then
                echo 'workloads=[{"label":"profile-default","eps_per_sec":300}]' >>"$GITHUB_OUTPUT"
              else
                echo 'workloads=[{"label":"profile-smoke","eps_per_sec":100}]' >>"$GITHUB_OUTPUT"
              fi
              ;;
            ladder)
              echo 'workloads=[{"label":"t1","eps_per_sec":1},{"label":"t10","eps_per_sec":10},{"label":"t100","eps_per_sec":100},{"label":"t1k","eps_per_sec":1000},{"label":"t10k","eps_per_sec":10000},{"label":"t100k","eps_per_sec":100000},{"label":"t1m","eps_per_sec":1000000}]' >>"$GITHUB_OUTPUT"
              ;;
            ladder_and_max)
              echo 'workloads=[{"label":"t1","eps_per_sec":1},{"label":"t10","eps_per_sec":10},{"label":"t100","eps_per_sec":100},{"label":"t1k","eps_per_sec":1000},{"label":"t10k","eps_per_sec":10000},{"label":"t100k","eps_per_sec":100000},{"label":"t1m","eps_per_sec":1000000},{"label":"tmax","eps_per_sec":0}]' >>"$GITHUB_OUTPUT"
              ;;
            max)
              echo 'workloads=[{"label":"tmax","eps_per_sec":0}]' >>"$GITHUB_OUTPUT"
              ;;
            *)
              echo "unsupported target_set: ${TARGET_SET}" >&2
              exit 2
              ;;
          esac

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${INPUT_COLLECTOR}" != "all" ]]; then
            echo "collectors=[\"${INPUT_COLLECTOR}\"]" >>"$GITHUB_OUTPUT"
          else
            echo 'collectors=["logfwd","otelcol","vector","filebeat"]' >>"$GITHUB_OUTPUT"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${INPUT_CPU_PROFILE}" != "all" ]]; then
            echo "cpu_profiles=[\"${INPUT_CPU_PROFILE}\"]" >>"$GITHUB_OUTPUT"
          else
            echo 'cpu_profiles=["single","multi"]' >>"$GITHUB_OUTPUT"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${INPUT_INGEST_MODE}" != "all" ]]; then
            echo "ingest_modes=[\"${INPUT_INGEST_MODE}\"]" >>"$GITHUB_OUTPUT"
          else
            echo 'ingest_modes=["file","otlp"]' >>"$GITHUB_OUTPUT"
          fi

  compose-bench-smoke:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        ingest_mode: ${{ fromJSON(needs.plan.outputs.ingest_modes) }}
        collector: ${{ fromJSON(needs.plan.outputs.collectors) }}
        cpu_profile: ${{ fromJSON(needs.plan.outputs.cpu_profiles) }}
        workload: ${{ fromJSON(needs.plan.outputs.workloads) }}
        exclude:
          - ingest_mode: otlp
            collector: vector
          - ingest_mode: otlp
            collector: filebeat
    env:
      MEMAGENT_REPO_ROOT: ${{ github.workspace }}/memagent
      BENCH_PROFILE: ${{ needs.plan.outputs.bench_profile }}
      BENCH_RESULTS_DIR: ${{ github.workspace }}/bench/compose/results/${{ needs.plan.outputs.bench_profile }}/${{ matrix.ingest_mode }}/${{ matrix.workload.label }}/${{ matrix.cpu_profile }}/${{ matrix.collector }}
      BENCH_COLLECTOR: ${{ matrix.collector }}
      BENCH_INGEST_MODE: ${{ matrix.ingest_mode }}
      BENCH_CPU_PROFILE: ${{ matrix.cpu_profile }}
      BENCH_WORKLOAD_LABEL: ${{ matrix.workload.label }}
      BENCH_EPS_PER_SEC: ${{ matrix.workload.eps_per_sec }}
      BENCHKIT_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}--compose-bench-${{ needs.plan.outputs.bench_profile }}-${{ matrix.ingest_mode }}-${{ matrix.workload.label }}-${{ matrix.cpu_profile }}-${{ matrix.collector }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - id: checkout_memagent
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          repository: strawgate/memagent
          ref: ${{ env.MEMAGENT_REF }}
          path: memagent
          persist-credentials: false
      - if: steps.checkout_memagent.outcome == 'failure'
        name: Fallback clone memagent checkout
        shell: bash
        run: |
          set -euo pipefail
          repo_url="https://github.com/strawgate/memagent.git"
          ref="${MEMAGENT_REF}"
          rm -rf memagent
          for attempt in 1 2 3; do
            echo "Fallback clone attempt ${attempt}/3 for ref ${ref}"
            if [[ "$ref" =~ ^[0-9a-f]{40}$ ]]; then
              if git clone --no-tags --depth 1 "$repo_url" memagent \
                && git -C memagent fetch --no-tags --depth 1 origin "$ref" \
                && git -C memagent checkout --detach FETCH_HEAD; then
                break
              fi
            else
              if git clone --no-tags --depth 1 --branch "$ref" "$repo_url" memagent; then
                break
              fi
            fi
            rm -rf memagent
            if [[ "$attempt" -eq 3 ]]; then
              echo "Failed to clone memagent ref ${ref} after retries" >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done
      - uses: ./.github/actions/setup-memagent-build
        with:
          memagent-repo-root: memagent
          memagent-ref: ${{ env.MEMAGENT_REF }}
      - uses: ./.github/actions/setup-compose
        with:
          results-dir: ${{ env.BENCH_RESULTS_DIR }}
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Start Octo11y monitor
        id: monitor
        uses: strawgate/octo11y/actions/monitor@main-dist
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        with:
          run-id: ${{ env.BENCHKIT_RUN_ID }}
          scrape-interval: 1s
          metric-sets: cpu,memory,load,process
      - name: Run compose benchmark harness
        continue-on-error: ${{ github.event_name == 'schedule' || matrix.workload.label == 'tmax' || matrix.workload.eps_per_sec >= 10000 }}
        run: |
          set -euo pipefail
          mkdir -p "${BENCH_RESULTS_DIR}"
          HARNESS_LOG="${BENCH_RESULTS_DIR}/harness.log"
          if ! python3 bench/compose/run.py \
            --collector "${BENCH_COLLECTOR}" \
            --ingest-mode "${BENCH_INGEST_MODE}" \
            --profile "${BENCH_PROFILE}" \
            --cpu-profile "${BENCH_CPU_PROFILE}" \
            --eps-per-sec "${BENCH_EPS_PER_SEC}" \
            --benchkit-run-id "${BENCHKIT_RUN_ID}" \
            --benchkit-kind "hybrid" \
            --results-dir "${BENCH_RESULTS_DIR}" \
            >"${HARNESS_LOG}" 2>&1; then
            echo "compose harness failed, tailing ${HARNESS_LOG}"
            tail -n 200 "${HARNESS_LOG}" || true
            exit 1
          fi
          tail -n 40 "${HARNESS_LOG}" || true
      - if: always()
        name: Ensure fallback benchmark result exists
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          results_dir = Path(os.environ["BENCH_RESULTS_DIR"])
          result_path = results_dir / "result.json"
          if result_path.exists():
            raise SystemExit(0)

          results_dir.mkdir(parents=True, exist_ok=True)
          fallback = {
            "benchmark_id": "missing-result",
            "timestamp_utc": "",
            "phase": "smoke",
            "benchmark_mode": "baseline-pass-through",
            "cluster": "docker-compose",
            "cluster_name": "",
            "namespace": "compose",
            "collector": os.environ.get("BENCH_COLLECTOR", "unknown"),
            "protocol": "otlp_http",
            "ingest_mode": os.environ.get("BENCH_INGEST_MODE", "unknown"),
            "cpu_profile": os.environ.get("BENCH_CPU_PROFILE", "unknown"),
            "cluster_cpu_limit_cores": None,
            "pods": 1,
            "target_eps_per_pod": int(os.environ.get("BENCH_EPS_PER_SEC", "0") or 0),
            "total_target_eps": int(os.environ.get("BENCH_EPS_PER_SEC", "0") or 0),
            "warmup_sec": None,
            "measure_sec": None,
            "cooldown_sec": None,
            "sink_lines_total": 0,
            "emitter_reported_events_total": None,
            "sink_reported_events_total": 0,
            "captured_rows_total": None,
            "source_rows_total": None,
            "missing_source_count": None,
            "missing_event_count": None,
            "unexpected_event_count": None,
            "sink_lines_per_sec_avg": 0.0,
            "sink_lines_per_sec_p50": None,
            "sink_lines_per_sec_p95": None,
            "sink_lines_per_sec_p99": None,
            "drop_estimate": None,
            "dup_estimate": None,
            "latency_ms_p50": None,
            "latency_ms_p95": None,
            "latency_ms_p99": None,
            "collector_cpu_cores_avg": None,
            "collector_cpu_cores_p95": None,
            "collector_rss_mb_avg": None,
            "collector_rss_mb_p95": None,
            "cluster_ready": False,
            "sink_ready": False,
            "status": "fail",
            "notes": "compose benchmark harness exited before writing result.json",
          }
          result_path.write_text(json.dumps(fallback, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          (results_dir / "summary.md").write_text(
            "# Benchmark result missing\n\n"
            "- status: `fail`\n"
            "- notes: compose benchmark harness exited before writing result.json\n",
            encoding="utf-8",
          )
          print(f"wrote fallback result at {result_path}")
          PY
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Materialize monitor OTLP document
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          monitor_jsonl = Path(os.environ["RUNNER_TEMP"]) / "benchkit-telemetry.otlp.jsonl"
          out_path = Path(os.environ["BENCH_RESULTS_DIR"]) / "monitor.otlp.json"
          resource_metrics = []
          if monitor_jsonl.exists():
            with monitor_jsonl.open("r", encoding="utf-8") as handle:
              for raw in handle:
                line = raw.strip()
                if not line:
                  continue
                doc = json.loads(line)
                values = doc.get("resourceMetrics")
                if isinstance(values, list):
                  resource_metrics.extend(values)
          payload = {"resourceMetrics": resource_metrics}
          out_path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(f"wrote {out_path} with {len(resource_metrics)} resourceMetrics entries")
          PY
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Stash jitter
        shell: bash
        run: |
          seed="$(printf '%s' "${BENCHKIT_RUN_ID}" | cksum | awk '{print $1}')"
          sleep_seconds=$(( (seed % 17) + 3 ))
          echo "Delaying stash push by ${sleep_seconds}s to reduce bench-data contention"
          sleep "${sleep_seconds}"
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Stash benchmark run
        continue-on-error: true
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        uses: strawgate/octo11y/actions/stash@main-dist
        with:
          results: ${{ env.BENCH_RESULTS_DIR }}/benchkit-run.otlp.json
          monitor-results: ${{ env.BENCH_RESULTS_DIR }}/monitor.otlp.json
          format: otlp
          run-id: ${{ env.BENCHKIT_RUN_ID }}
          summary: false
      - if: always()
        uses: actions/upload-artifact@v5
        with:
          name: compose-bench-${{ needs.plan.outputs.bench_profile }}-${{ matrix.ingest_mode }}-${{ matrix.workload.label }}-${{ matrix.cpu_profile }}-${{ matrix.collector }}
          path: ${{ env.BENCH_RESULTS_DIR }}
          retention-days: 7

  summarize:
    if: always()
    needs:
      - plan
      - compose-bench-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Render benchmark summary
        env:
          SUITE_NAME: ${{ github.event_name == 'schedule' && 'Bench Compose Nightly EPS' || 'Bench Compose Competitive Benchmarks' }}
        run: |
          python3 bench/kind/render_issue_summary.py \
            --artifacts-root artifacts \
            --suite-name "${SUITE_NAME}" \
            --suite-key compose-bench-${{ needs.plan.outputs.bench_profile }}-${{ needs.plan.outputs.target_set }} \
            --memagent-ref "${MEMAGENT_REF}" \
            --bench-profile "${{ needs.plan.outputs.bench_profile }}" \
            --run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --output-markdown bench-summary.md \
            --output-json bench-summary.json
      - name: Publish benchmark summary
        run: cat bench-summary.md >>"$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v5
        with:
          name: bench-compose-summary
          path: |
            bench-summary.md
            bench-summary.json
          retention-days: 7
      - if: env.PERSIST_BENCH_DATA == 'true'
        name: Trigger aggregate
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run bench-kind-aggregate.yml --repo ${{ github.repository }}
      - if: github.event_name != 'pull_request'
        id: issue_meta
        name: Compute benchmark issue metadata
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            {
              echo "title_base=Bench Compose Nightly EPS Report"
              echo "suite_key=bench-compose-nightly-eps"
              echo "labels=live-suite-report,report:bench,report:bench-compose,report:bench-compose-nightly-eps"
            } >>"$GITHUB_OUTPUT"
          else
            {
              echo "title_base=Bench Compose Competitive Benchmarks Report"
              echo "suite_key=bench-compose-competitive"
              echo "labels=live-suite-report,report:bench,report:bench-compose,report:bench-compose-competitive"
            } >>"$GITHUB_OUTPUT"
          fi
      - if: github.event_name != 'pull_request'
        name: Upsert benchmark issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE_BASE: ${{ steps.issue_meta.outputs.title_base }}
          ISSUE_BODY_FILE: ${{ github.workspace }}/bench-summary.md
          ISSUE_SUMMARY_JSON_FILE: ${{ github.workspace }}/bench-summary.json
          ISSUE_SUITE_KEY: ${{ steps.issue_meta.outputs.suite_key }}
          ISSUE_LABELS: ${{ steps.issue_meta.outputs.labels }}
        run: tests/e2e/lib/upsert_issue.sh
      - if: always()
        name: Enforce benchmark matrix truthfulness
        env:
          EXPECTED_COLLECTORS: ${{ needs.plan.outputs.collectors }}
          EXPECTED_CPU_PROFILES: ${{ needs.plan.outputs.cpu_profiles }}
          EXPECTED_INGEST_MODES: ${{ needs.plan.outputs.ingest_modes }}
          EXPECTED_WORKLOADS: ${{ needs.plan.outputs.workloads }}
          NON_GATING_EPS_MIN: "10000"
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          with open("bench-summary.json", "r", encoding="utf-8") as handle:
            summary = json.load(handle)

          benchmark_count = int(summary.get("benchmark_count", 0))
          failed_count = int(summary.get("failed_count", 0))
          non_gating_eps_min = int(os.environ.get("NON_GATING_EPS_MIN", "10000"))

          collectors = json.loads(os.environ["EXPECTED_COLLECTORS"])
          cpu_profiles = json.loads(os.environ["EXPECTED_CPU_PROFILES"])
          ingest_modes = json.loads(os.environ["EXPECTED_INGEST_MODES"])
          workloads = json.loads(os.environ["EXPECTED_WORKLOADS"])

          expected = len(collectors) * len(cpu_profiles) * len(ingest_modes) * len(workloads)
          if "vector" in collectors and "otlp" in ingest_modes:
            expected -= len(cpu_profiles) * len(workloads)
          if "filebeat" in collectors and "otlp" in ingest_modes:
            expected -= len(cpu_profiles) * len(workloads)

          print(
            f"expected={expected} benchmark_count={benchmark_count} failed_count={failed_count}"
          )

          if benchmark_count < expected:
            print(
              f"missing benchmark artifacts: expected {expected}, got {benchmark_count}",
              file=sys.stderr,
            )
            sys.exit(1)
          gating_failures = []
          tolerated_failures = []
          for row in summary.get("results", []):
            status = str(row.get("status") or "fail").lower()
            target_eps = int(row.get("total_target_eps", 0) or 0)
            non_gating = target_eps == 0 or target_eps >= non_gating_eps_min
            if status == "pass":
              continue
            if non_gating:
              tolerated_failures.append(
                {
                  "artifact": row.get("artifact_name"),
                  "collector": row.get("collector"),
                  "ingest_mode": row.get("ingest_mode"),
                  "cpu_profile": row.get("cpu_profile"),
                  "target_eps": target_eps,
                  "status": status,
                }
              )
            else:
              gating_failures.append(
                {
                  "artifact": row.get("artifact_name"),
                  "collector": row.get("collector"),
                  "ingest_mode": row.get("ingest_mode"),
                  "cpu_profile": row.get("cpu_profile"),
                  "target_eps": target_eps,
                  "status": status,
                }
              )

          if tolerated_failures:
            print(f"tolerating {len(tolerated_failures)} non-gating failures")
            for row in tolerated_failures[:20]:
              print(row)
          if gating_failures:
            print("gating benchmark failures detected:", file=sys.stderr)
            for row in gating_failures[:20]:
              print(row, file=sys.stderr)
            sys.exit(1)

          integrity_violations = []
          for row in summary.get("results", []):
            target_eps = int(row.get("total_target_eps", 0) or 0)
            if target_eps == 0 or target_eps >= non_gating_eps_min:
              continue
            missing = int(row.get("missing_event_count", 0) or 0)
            unexpected = int(row.get("unexpected_event_count", 0) or 0)
            dup = int(row.get("dup_estimate", 0) or 0)
            drop = int(row.get("drop_estimate", 0) or 0)
            if missing > 0 or unexpected > 0 or dup > 0 or drop > 0:
              integrity_violations.append(
                {
                  "artifact": row.get("artifact_name"),
                  "missing": missing,
                  "unexpected": unexpected,
                  "dup": dup,
                  "drop": drop,
                }
              )

          if integrity_violations:
            print("integrity violations detected:", file=sys.stderr)
            for violation in integrity_violations[:20]:
              print(violation, file=sys.stderr)
            sys.exit(1)
          PY
