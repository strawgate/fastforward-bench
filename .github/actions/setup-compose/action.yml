name: Setup Compose
description: Validate Docker Compose availability and prepare a results directory

inputs:
  results-dir:
    description: Scenario results directory
    required: true

runs:
  using: composite
  steps:
    - name: Validate Docker Compose
      shell: bash
      run: docker compose version

    - name: Prepare results dir
      shell: bash
      run: mkdir -p "${{ inputs.results-dir }}"
