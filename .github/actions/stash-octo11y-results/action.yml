name: Stash Octo11y results
description: Local wrapper so non-persistent benchmark jobs do not resolve the external action

inputs:
  results:
    description: Result file path
    required: true
  format:
    description: Result format
    required: true
  run-id:
    description: Benchkit run id
    required: true
  summary:
    description: Whether Octo11y should emit a summary
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: strawgate/octo11y/actions/stash@main-dist
      env:
        GIT_AUTHOR_NAME: github-actions[bot]
        GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        GIT_COMMITTER_NAME: github-actions[bot]
        GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      with:
        results: ${{ inputs.results }}
        format: ${{ inputs.format }}
        run-id: ${{ inputs.run-id }}
        summary: ${{ inputs.summary }}
