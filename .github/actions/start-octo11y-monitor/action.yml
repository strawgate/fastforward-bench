name: Start Octo11y monitor
description: Local wrapper so non-persistent benchmark jobs do not resolve the external action

inputs:
  run-id:
    description: Benchkit run id
    required: true
  scrape-interval:
    description: Monitor scrape interval
    required: false
    default: 1s
  metric-sets:
    description: Metric sets to collect
    required: false
    default: cpu,memory,load,process

outputs:
  otlp-http-endpoint:
    description: OTLP HTTP endpoint exposed by the monitor action
    value: ${{ steps.monitor.outputs.otlp-http-endpoint }}

runs:
  using: composite
  steps:
    - id: monitor
      uses: strawgate/octo11y/actions/monitor@main-dist
      env:
        GIT_AUTHOR_NAME: github-actions[bot]
        GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        GIT_COMMITTER_NAME: github-actions[bot]
        GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      with:
        run-id: ${{ inputs.run-id }}
        scrape-interval: ${{ inputs.scrape-interval }}
        metric-sets: ${{ inputs.metric-sets }}
