name: Setup Memagent Build
description: Pull or build the memagent Docker image used by e2e scenarios

inputs:
  memagent-repo-root:
    description: Path to the checked out memagent repository
    required: false
    default: memagent
  memagent-ref:
    description: Memagent branch, tag, or SHA under test
    required: false
    default: main
  image-repository:
    description: GHCR image repository to try before falling back to a local build
    required: false
    default: ghcr.io/strawgate/memagent

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable

    - name: Log in to GitHub Container Registry
      shell: bash
      run: |
        echo "${{ github.token }}" | docker login ghcr.io \
          --username "${{ github.actor }}" \
          --password-stdin

    - name: Resolve image source
      shell: bash
      run: |
        ref="${{ inputs.memagent-ref }}"
        image_repo="${{ inputs.image-repository }}"
        candidates=()
        if [[ "$ref" == "main" ]]; then
          candidates+=("${image_repo}:main" "${image_repo}:master")
        elif [[ "$ref" == "master" ]]; then
          candidates+=("${image_repo}:master" "${image_repo}:main")
        elif [[ "$ref" =~ ^[0-9a-f]{40}$ ]]; then
          candidates+=("${image_repo}:sha-${ref}")
        fi

        for candidate in "${candidates[@]}"; do
          echo "Trying prebuilt image: $candidate"
          if docker pull "$candidate"; then
            docker tag "$candidate" logfwd:e2e
            exit 0
          fi
        done
        if [[ "${#candidates[@]}" -gt 0 ]]; then
          echo "Prebuilt image unavailable, falling back to local build"
        fi

        docker build \
          --file "${{ inputs.memagent-repo-root }}/Dockerfile.e2e" \
          --build-arg CARGO_BUILD_JOBS=2 \
          --build-arg CARGO_PROFILE_RELEASE_LTO=off \
          --build-arg CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16 \
          --build-arg CARGO_PROFILE_RELEASE_DEBUG=0 \
          -t logfwd:e2e \
          "${{ inputs.memagent-repo-root }}"
