name: Setup Memagent Build
description: Build the memagent Docker image used by e2e scenarios

inputs:
  memagent-repo-root:
    description: Path to the checked out memagent repository
    required: false
    default: memagent

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable

    - name: Build image
      shell: bash
      run: |
        dockerfile="$(mktemp)"
        trap 'rm -f "$dockerfile"' EXIT
        cat >"$dockerfile" <<'EOF'
        # syntax=docker/dockerfile:1
        FROM rust:1-bookworm AS builder
        ARG RUSTFLAGS=""
        ARG CARGO_BUILD_JOBS="2"
        ARG CARGO_PROFILE_RELEASE_LTO="off"
        ARG CARGO_PROFILE_RELEASE_CODEGEN_UNITS="16"
        ARG CARGO_PROFILE_RELEASE_DEBUG="0"
        WORKDIR /src
        COPY Cargo.toml Cargo.lock ./
        COPY crates/ crates/
        RUN --mount=type=cache,target=/src/target \
            --mount=type=cache,target=/usr/local/cargo/registry \
            CARGO_BUILD_RUSTC_WRAPPER="" \
            CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS}" \
            CARGO_PROFILE_RELEASE_LTO="${CARGO_PROFILE_RELEASE_LTO}" \
            CARGO_PROFILE_RELEASE_CODEGEN_UNITS="${CARGO_PROFILE_RELEASE_CODEGEN_UNITS}" \
            CARGO_PROFILE_RELEASE_DEBUG="${CARGO_PROFILE_RELEASE_DEBUG}" \
            RUSTFLAGS="${RUSTFLAGS}" \
            cargo build --release --bin logfwd && \
            strip target/release/logfwd && \
            cp target/release/logfwd /logfwd

        FROM gcr.io/distroless/cc-debian12:nonroot
        COPY --from=builder /logfwd /usr/local/bin/logfwd
        USER nonroot
        EXPOSE 9090
        ENTRYPOINT ["logfwd"]
        EOF

        docker build \
          --file "$dockerfile" \
          --build-arg CARGO_BUILD_JOBS=2 \
          --build-arg CARGO_PROFILE_RELEASE_LTO=off \
          --build-arg CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16 \
          --build-arg CARGO_PROFILE_RELEASE_DEBUG=0 \
          -t logfwd:e2e \
          "${{ inputs.memagent-repo-root }}"
