name: Setup KIND
description: Install KIND, ensure a cluster exists, and load the e2e image

inputs:
  cluster-name:
    description: KIND cluster name
    required: true
  image:
    description: Docker image to load into the cluster
    required: false
    default: fastforward:e2e

runs:
  using: composite
  steps:
    - name: Install KIND
      shell: bash
      run: |
        KIND_VERSION="v0.24.0"
        if ! command -v kind >/dev/null 2>&1 || ! kind version | grep -q "${KIND_VERSION}"; then
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
        fi
        kind version

    - name: Create or reuse cluster
      shell: bash
      run: |
        set -x
        echo "DEBUG: Docker info"
        docker info || echo "DEBUG: docker info failed: $?"
        echo "DEBUG: Checking if cluster '${{ inputs.cluster-name }}' exists..."
        if ! kind get clusters 2>&1 | grep -q "^${{ inputs.cluster-name }}$"; then
          echo "DEBUG: Cluster does not exist, creating..."
          kind create cluster --name "${{ inputs.cluster-name }}" --wait 60s
        else
          echo "DEBUG: Cluster already exists, skipping creation"
        fi

    - name: Load image
      shell: bash
      run: kind load docker-image "${{ inputs.image }}" --name "${{ inputs.cluster-name }}"
